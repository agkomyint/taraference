# Build a Linux x86_64 **tarafer** release binary and attach it to a GitHub Release.
#
# Triggers:
#   - push of version tags: v0.1.0, v1.2.3, …
#   - manual: Actions → Release → Run workflow
#
# Runtime still needs: NVIDIA driver + CUDA 13.x toolkit (NVRTC) on the machine.
# Compile does NOT need the CUDA toolkit: cudarc is built with
# fallback-dynamic-loading + cuda-13020 feature flags.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/publish (e.g. v0.2.0). Leave empty to only build artifacts."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
  CUDARC_CUDA_VERSION: "13020"

jobs:
  linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mold (fast linker)
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends mold
          mold --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: release-linux
          cache-on-failure: true

      - name: Build release
        run: cargo build --release -p taraference --locked

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN=target/release/tarafer
          test -x "$BIN"
          strip "$BIN" || true
          cp "$BIN" dist/tarafer
          tar -C dist -czf tarafer-linux-x86_64.tar.gz tarafer
          (cd dist && sha256sum tarafer > tarafer.sha256)
          sha256sum tarafer-linux-x86_64.tar.gz > tarafer-linux-x86_64.tar.gz.sha256
          ls -lh dist/tarafer tarafer-linux-x86_64.tar.gz
          file dist/tarafer
          ldd dist/tarafer || true
          ./dist/tarafer --version || true

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tarafer-linux-x86_64
          path: |
            dist/tarafer
            dist/tarafer.sha256
            tarafer-linux-x86_64.tar.gz
            tarafer-linux-x86_64.tar.gz.sha256
          if-no-files-found: error

      - name: Publish GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/tarafer
            dist/tarafer.sha256
            tarafer-linux-x86_64.tar.gz
            tarafer-linux-x86_64.tar.gz.sha256
          generate_release_notes: true
          body: |
            ## `tarafer` prebuilt binary (Linux x86_64)

            Fast path — no Rust compile:

            ```bash
            curl -fsSL -o tarafer-linux-x86_64.tar.gz \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tarafer-linux-x86_64.tar.gz
            tar -xzf tarafer-linux-x86_64.tar.gz
            chmod +x tarafer
            ./tarafer install          # → ~/.local/bin/tarafer (on PATH)
            tarafer --download 0.5b
            tarafer models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf
            ```

            Update later on the same machine:

            ```bash
            tarafer update
            # or refresh PATH install:
            tarafer update --install
            ```

            **Runtime:** NVIDIA GPU + driver, CUDA **13.x** toolkit (NVRTC).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release (manual tag)
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: |
            dist/tarafer
            dist/tarafer.sha256
            tarafer-linux-x86_64.tar.gz
            tarafer-linux-x86_64.tar.gz.sha256
          generate_release_notes: true
          body: |
            ## `tarafer` prebuilt binary (Linux x86_64)

            ```bash
            curl -fsSL -o tarafer-linux-x86_64.tar.gz \
              https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/tarafer-linux-x86_64.tar.gz
            tar -xzf tarafer-linux-x86_64.tar.gz && chmod +x tarafer
            ./tarafer install
            tarafer --download 0.5b
            tarafer models/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf
            # later: tarafer update
            ```

            **Runtime:** NVIDIA GPU + driver, CUDA 13.x (NVRTC).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
