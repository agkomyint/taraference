# Build Linux + Windows x86_64 **tarafer** release binaries and attach them to a GitHub Release.
#
# Triggers:
#   - push of version tags: v0.1.0, v1.2.3, …
#   - manual: Actions → Release → Run workflow
#
# Runtime still needs: NVIDIA driver + CUDA 13.x toolkit (NVRTC) on the machine.
# Compile does NOT need the CUDA toolkit: cudarc is built with
# fallback-dynamic-loading + cuda-13020 feature flags.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/publish (e.g. v0.2.0). Leave empty to only build artifacts."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CUDARC_CUDA_VERSION: "13020"

jobs:
  linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mold (fast linker)
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends mold
          mold --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: release-linux
          cache-on-failure: true

      - name: Build release
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
        run: cargo build --release -p taraference --locked

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN=target/release/tarafer
          test -x "$BIN"
          strip "$BIN" || true
          cp "$BIN" dist/tarafer
          tar -C dist -czf dist/tarafer-linux-x86_64.tar.gz tarafer
          (cd dist && sha256sum tarafer > tarafer.sha256)
          (cd dist && sha256sum tarafer-linux-x86_64.tar.gz > tarafer-linux-x86_64.tar.gz.sha256)
          ls -lh dist/
          file dist/tarafer
          ldd dist/tarafer || true
          ./dist/tarafer --version || true

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tarafer-linux-x86_64
          path: dist/
          if-no-files-found: error

  windows-x86_64:
    name: Build Windows x86_64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: release-windows
          cache-on-failure: true

      - name: Build release
        run: cargo build --release -p taraference --locked

      - name: Package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = "target\release\tarafer.exe"
          if (-not (Test-Path $bin)) { throw "missing $bin" }
          Copy-Item $bin "dist\tarafer.exe"
          # Windows 10+ tar can create zip archives
          $zip = "dist\tarafer-windows-x86_64.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          tar -a -cf $zip -C dist tarafer.exe
          $exeHash = (Get-FileHash -Algorithm SHA256 "dist\tarafer.exe").Hash.ToLowerInvariant()
          $zipHash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLowerInvariant()
          Set-Content -NoNewline -Path "dist\tarafer.exe.sha256" -Value "$exeHash  tarafer.exe`n"
          Set-Content -NoNewline -Path "dist\tarafer-windows-x86_64.zip.sha256" -Value "$zipHash  tarafer-windows-x86_64.zip`n"
          Get-Item "dist\tarafer.exe", $zip | Format-Table Name, Length
          & "dist\tarafer.exe" --version

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tarafer-windows-x86_64
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [linux-x86_64, windows-x86_64]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    runs-on: ubuntu-22.04

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v7
        with:
          name: tarafer-linux-x86_64
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v7
        with:
          name: tarafer-windows-x86_64
          path: release-assets

      - name: List assets
        run: ls -lah release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            release-assets/tarafer
            release-assets/tarafer.sha256
            release-assets/tarafer-linux-x86_64.tar.gz
            release-assets/tarafer-linux-x86_64.tar.gz.sha256
            release-assets/tarafer.exe
            release-assets/tarafer.exe.sha256
            release-assets/tarafer-windows-x86_64.zip
            release-assets/tarafer-windows-x86_64.zip.sha256
          generate_release_notes: true
          body: |
            ## `tarafer` prebuilt binaries

            ### Linux x86_64

            ```bash
            curl -fsSL -o tarafer-linux-x86_64.tar.gz \
              https://github.com/${{ github.repository }}/releases/download/${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}/tarafer-linux-x86_64.tar.gz
            tar -xzf tarafer-linux-x86_64.tar.gz
            chmod +x tarafer
            ./tarafer install          # → ~/.local/bin/tarafer (on PATH)
            tarafer --download 3b
            tarafer models/Qwen2.5-3B-Instruct-Q4_K_M.gguf
            ```

            Update later: `tarafer update` or `tarafer update --install`

            ### Windows x86_64

            ```powershell
            # download zip
            Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/releases/download/${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}/tarafer-windows-x86_64.zip" -OutFile tarafer-windows-x86_64.zip
            Expand-Archive .\tarafer-windows-x86_64.zip -DestinationPath .
            .\tarafer.exe install
            .\tarafer.exe --download 3b
            .\tarafer.exe models\Qwen2.5-3B-Instruct-Q4_K_M.gguf
            ```

            Or grab the raw `tarafer.exe` asset from the release page.

            Update later: `tarafer update` or `tarafer update --install`

            **Runtime (both platforms):** NVIDIA GPU + driver, CUDA **13.x** toolkit (NVRTC).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
